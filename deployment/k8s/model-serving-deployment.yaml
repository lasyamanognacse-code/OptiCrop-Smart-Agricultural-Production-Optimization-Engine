apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  namespace: opticrop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: model-serving
  template:
    metadata:
      labels:
        app: model-serving
    spec:
      containers:
      - name: serving
        image: your-registry/opticrop-model-serving:latest
        ports:
        - containerPort: 8001
        env:
        - name: MODEL_PATH
          value: /app/artifacts/model.onnx
        volumeMounts:
        - name: model-storage
          mountPath: /app/artifacts
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: model-pvc
