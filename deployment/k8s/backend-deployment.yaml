apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: opticrop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-registry/opticrop-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: POSTGRES_HOST
          value: postgres
        - name: REDIS_URL
          value: redis://redis:6379
        - name: MODEL_SERVING_URL
          value: http://model-serving:8001
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
